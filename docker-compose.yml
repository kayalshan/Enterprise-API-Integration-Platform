name: enterprise-api-local

services:
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    restart: unless-stopped
    ports:
      - '9092:9092'
      - '9093:9093'
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    networks:
      - platform

  core-api-service:
    build:
      context: .
      dockerfile: services/core-api-service/Dockerfile
    depends_on:
      - kafka
    environment:
      SPRING_PROFILES_ACTIVE: local
      SERVER_PORT: 8080
      AWS_REGION: us-east-1
      AWS_MSK_BOOTSTRAP_SERVERS: kafka:29092
      PARTNER_SANDBOX_BASE_URL: http://partner-onboarding-service:8083/sandbox/v1
    ports:
      - '8080:8080'
    networks:
      - platform

  event-orchestration-service:
    build:
      context: .
      dockerfile: services/event-orchestration-service/Dockerfile
    depends_on:
      - kafka
    environment:
      SPRING_PROFILES_ACTIVE: local
      SERVER_PORT: 8081
      AWS_REGION: us-east-1
      AWS_MSK_BOOTSTRAP_SERVERS: kafka:29092
    ports:
      - '8081:8081'
    networks:
      - platform

  transformation-service:
    build:
      context: .
      dockerfile: services/transformation-service/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: local
      SERVER_PORT: 8082
      AWS_REGION: us-east-1
    ports:
      - '8082:8082'
    networks:
      - platform

  partner-onboarding-service:
    build:
      context: .
      dockerfile: services/partner-onboarding-service/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: local
      SERVER_PORT: 8083
      AWS_REGION: us-east-1
      PARTNER_SANDBOX_BASE_URL: http://partner-onboarding-service:8083/sandbox/v1
    ports:
      - '8083:8083'
    networks:
      - platform

networks:
  platform:
    name: enterprise-api-local-network

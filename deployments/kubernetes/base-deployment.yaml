apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-ingress-service
  labels:
    app: order-ingress-service
    tier: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-ingress-service
  template:
    metadata:
      labels:
        app: order-ingress-service
        tier: api
    spec:
      containers:
        - name: app
          image: example/order-ingress:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: platform-runtime-config
          env:
            - name: SERVER_PORT
              value: "8080"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
